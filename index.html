<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🚗 Smart Parking System</h1>

    <div class="row">

        <!-- Add Vehicle -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4 class="text-success">Add Vehicle</h4>
                <form action="/addVehicle" method="post">
                    <input type="text" class="form-control mb-2" name="vehicleNumber" placeholder="Vehicle Number" required>
                    <input type="text" class="form-control mb-2" name="vehicleType" placeholder="Vehicle Type" required>
                    <button class="btn btn-success w-100">Add Vehicle</button>
                </form>
            </div>
        </div>

        <!-- Assign Slot -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4 class="text-primary">Assign Slot</h4>
                <form action="/assignSlot" method="post">
                    <select class="form-control mb-2" name="vehicleId" required>
                        <option value="">Select Vehicle</option>
                        <option th:each="v : ${vehicles}" 
                                th:value="${v.vehicleId}" 
                                th:text="${v.vehicleNumber}">
                        </option>
                    </select>
                    <button class="btn btn-primary w-100">Assign Slot</button>
                </form>
            </div>
        </div>

        <!-- Exit Slot -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4 class="text-danger">Exit Vehicle</h4>
                <form action="/exitSlot" method="post">
                    <select class="form-control mb-2" name="vehicleId" required>
                        <option value="">Select Vehicle</option>
                        <option th:each="v : ${vehicles}" 
                                th:value="${v.vehicleId}" 
                                th:text="${v.vehicleNumber}">
                        </option>
                    </select>
                    <button class="btn btn-danger w-100">Exit Slot</button>
                </form>
            </div>
        </div>

    </div>

    <hr class="my-4">

    <div class="text-center">
        <a href="/vehiclesPage" class="btn btn-dark m-2">📋 View Vehicles</a>
        <a href="/slotsPage" class="btn btn-warning m-2">🅿️ View Slots</a>
		<a href="/recordsPage" class="btn btn-info m-2">📊 View Records</a>
		
    </div>

</div>

</body>
</html>
