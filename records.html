<!DOCTYPE html>
<html>
<head>
    <title>Parking Records</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Parking History</h2>

    <div class="card shadow p-4">

        <table class="table table-hover table-bordered text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Record ID</th>
                    <th>Vehicle ID</th>
                    <th>Slot ID</th>
                    <th>Entry Time</th>
                    <th>Exit Time</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="r : ${records}">
                    <td th:text="${r.recordId}"></td>
                    <td th:text="${r.vehicleId}"></td>
                    <td th:text="${r.slotId}"></td>
                    <td th:text="${r.entryTime}"></td>
                    <td th:text="${r.exitTime}"></td>
                </tr>
            </tbody>

        </table>

    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>>
